<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password – EduAuth Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="brand">🎓 EduAuth Platform</h1>
    </div>
  </header>

  <main class="container">
    <section class="card" style="max-width:500px; margin:2rem auto">
      <h2>Reset Your Password</h2>
      <p class="muted">Enter your new password below.</p>

      <form id="resetPasswordForm">
        <div class="form-control">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters" />
          <small class="error" id="passwordError"></small>
        </div>

        <div class="form-control">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter password" />
          <small class="error" id="confirmPasswordError"></small>
        </div>

        <button id="submitBtn" type="submit" class="btn primary">
          Reset Password
        </button>

        <div id="formStatus" class="form-status" role="status" aria-live="polite"></div>
      </form>

      <p style="text-align:center; margin-top:1.5rem">
        <a href="index.html" class="muted">Back to Login</a>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="muted">© <span id="year"></span> EduAuth Platform. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (function(){
      const API_URL = 'http://localhost:3000';
      const form = document.getElementById('resetPasswordForm');
      const submitBtn = document.getElementById('submitBtn');
      const statusEl = document.getElementById('formStatus');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const passwordError = document.getElementById('passwordError');
      const confirmPasswordError = document.getElementById('confirmPasswordError');
      const yearEl = document.getElementById('year');
      
      if (yearEl) yearEl.textContent = new Date().getFullYear().toString();

      // Get token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        statusEl.textContent = 'Invalid reset link. Please request a new one.';
        statusEl.classList.add('error-message');
        submitBtn.disabled = true;
        return;
      }

      function validatePassword(value) {
        const lengthOK = value.length >= 8;
        const letterOK = /[A-Za-z]/.test(value);
        const numberOK = /\d/.test(value);
        return lengthOK && letterOK && numberOK;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        statusEl.textContent = '';
        statusEl.className = 'form-status';
        passwordError.textContent = '';
        confirmPasswordError.textContent = '';

        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // Validation
        if (!password) {
          passwordError.textContent = 'Password is required';
          return;
        }

        if (!validatePassword(password)) {
          passwordError.textContent = 'Min 8 chars with letters and numbers';
          return;
        }

        if (password !== confirmPassword) {
          confirmPasswordError.textContent = 'Passwords do not match';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting...';

        try {
          const response = await fetch(`${API_URL}/api/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password })
          });

          const data = await response.json();

          if (response.ok && data.success) {
            statusEl.textContent = data.message;
            statusEl.classList.add('success-message');
            form.reset();
            
            // Redirect to login after 2 seconds
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 2000);
          } else {
            statusEl.textContent = data.message || 'Failed to reset password';
            statusEl.classList.add('error-message');
          }
        } catch (error) {
          console.error('Reset password error:', error);
          statusEl.textContent = 'Network error. Please try again.';
          statusEl.classList.add('error-message');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        }
      });
    })();
  </script>
</body>
</html>
