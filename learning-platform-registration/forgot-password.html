<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password – EduAuth Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="brand">🎓 EduAuth Platform</h1>
    </div>
  </header>

  <main class="container">
    <section class="card" style="max-width:500px; margin:2rem auto">
      <h2>Forgot Password?</h2>
      <p class="muted">Enter your email address and we'll send you a link to reset your password.</p>

      <form id="forgotPasswordForm">
        <div class="form-control">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com" />
          <small class="error" id="emailError"></small>
        </div>

        <button id="submitBtn" type="submit" class="btn primary">
          Send Reset Link
        </button>

        <div id="formStatus" class="form-status" role="status" aria-live="polite"></div>
      </form>

      <p style="text-align:center; margin-top:1.5rem">
        <a href="index.html" class="muted">Back to Login</a>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="muted">© <span id="year"></span> EduAuth Platform. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (function(){
      const API_URL = 'http://localhost:3000';
      const form = document.getElementById('forgotPasswordForm');
      const submitBtn = document.getElementById('submitBtn');
      const statusEl = document.getElementById('formStatus');
      const emailInput = document.getElementById('email');
      const emailError = document.getElementById('emailError');
      const yearEl = document.getElementById('year');
      
      if (yearEl) yearEl.textContent = new Date().getFullYear().toString();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        statusEl.textContent = '';
        statusEl.className = 'form-status';
        emailError.textContent = '';

        const email = emailInput.value.trim();

        if (!email) {
          emailError.textContent = 'Email is required';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';

        try {
          const response = await fetch(`${API_URL}/api/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });

          const data = await response.json();

          if (response.ok && data.success) {
            statusEl.textContent = data.message;
            statusEl.classList.add('success-message');
            form.reset();
          } else {
            statusEl.textContent = data.message || 'Failed to send reset link';
            statusEl.classList.add('error-message');
          }
        } catch (error) {
          console.error('Forgot password error:', error);
          statusEl.textContent = 'Network error. Please try again.';
          statusEl.classList.add('error-message');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send Reset Link';
        }
      });
    })();
  </script>
</body>
</html>
